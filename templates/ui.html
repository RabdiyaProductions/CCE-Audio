<!doctype html>
<html lang="en"><head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Nav Anywhere</title>
<style>
  body{font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;background:#0b1220;color:#e6edf3;margin:0}
  a{color:#7dd3fc;text-decoration:none}
  .wrap{max-width:1100px;margin:28px auto;padding:0 16px}
  .card{background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.08);border-radius:16px;padding:18px}
  input{width:100%;padding:10px 12px;border-radius:12px;border:1px solid rgba(255,255,255,0.15);background:rgba(0,0,0,0.25);color:#e6edf3}
  table{width:100%;border-collapse:collapse;margin-top:12px}
  th,td{padding:10px 8px;border-bottom:1px solid rgba(255,255,255,0.08);text-align:left;font-size:14px}
  .muted{color:#9aa4b2;font-size:13px}
  .pill{display:inline-block;padding:2px 8px;border:1px solid rgba(255,255,255,0.14);border-radius:999px;font-size:12px;color:#cbd5e1}
</style>
</head><body>
<div class="wrap">
  <div class="card">
    <h2 style="margin:0 0 6px 0">Nav Anywhere</h2>
    <div class="muted">Search and jump to any running app in this build. Uses local PORT_REGISTRY.* if present.</div>
    <div style="height:12px"></div>
    <input id="q" placeholder="Search name, group, path, port…" oninput="filterRows()" />
    <table id="t">
      <thead><tr><th>App</th><th>Group</th><th>Port</th><th>Open</th><th>Path</th></tr></thead>
      <tbody>
      {% for a in apps %}
        <tr>
          <td>{{ a.get('name','') }}</td>
          <td><span class="pill">{{ a.get('group','') }}</span></td>
          <td>{{ a.get('port','') }}</td>
          <td><a href="http://127.0.0.1:{{ a.get('port','') }}/" target="_blank" rel="noreferrer">Open</a></td>
          <td class="muted">{{ a.get('path','') }}</td>
        </tr>
      {% endfor %}
      </tbody>
    </table>
  </div>
</div>
<script>
function filterRows(){
  const q=document.getElementById('q').value.toLowerCase();
  const rows=document.querySelectorAll('#t tbody tr');
  rows.forEach(r=>{const txt=r.innerText.toLowerCase(); r.style.display=txt.includes(q)?'':'none';});
}
</script>
</body></html>

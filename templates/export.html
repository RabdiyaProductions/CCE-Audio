{% extends "base.html" %}
{% block content %}
<div class="grid">
  <div class="card">
    <div style="font-weight:900">Export state</div>
    <div class="muted">Download JSON of system prompt + thinking + addendums + outputs + tasks.</div>
    <a class="link" href="/export/state.json">Download state.json</a>
  </div>

  <div class="card">
    <div style="font-weight:900">Import state</div>
    <div class="muted">Restore from an exported state file.</div>
    <form method="post" action="/import" enctype="multipart/form-data">
      <input type="file" name="file" accept="application/json" />
      <button type="submit">Import</button>
    </form>
  </div>
</div>
{% endblock %}
